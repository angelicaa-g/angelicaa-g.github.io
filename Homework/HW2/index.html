<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/underscore@1.13.2/underscore-umd-min.js"></script>
  <title>US Geography Quiz</title>
</head>

<body class="text-center bg-light p-5">
  <div class="container">
    <h1 class="mb-4">US Geography Quiz</h1>

    <!-- First Question -->
    <h3><span id="markImg1"></span> What is the capital of California?</h3>
    <input type="text" id="q1" class="form-control w-25 mx-auto">
    <br>
    <div id="q1Feedback"></div>
    <br>

    <!-- Second Question -->
    <h3><span id="markImg2"></span>What is the longest river?</h3>
    <select id="q2" class="form-select w-25 mx-auto">
      <option value="">Select One</option>
      <option value="ms">Mississippi</option>
      <option value="mo">Missouri</option>
      <option value="co">Colorado</option>
      <option value="de">Delaware</option>
    </select>
    <br>
    <div id="q2Feedback"></div>
    <br>

    <!-- Third Question -->
    <h3><span id="markImg3"></span>What presidents are carved into Mount Rushmore?</h3>
    <div class="d-flex justify-content-center gap-3 flex-wrap">
      <div><input type="checkbox" id="Jackson"> <label for="Jackson">A. Jackson</label></div>
      <div><input type="checkbox" id="Franklin"> <label for="Franklin">B. Franklin</label></div>
      <div><input type="checkbox" id="Jefferson"> <label for="Jefferson">T. Jefferson</label></div>
      <div><input type="checkbox" id="Roosevelt"> <label for="Roosevelt">T. Roosevelt</label></div>
    </div>
    <br>
    <div id="q3Feedback"></div>
    <br>

    <!-- Fourth Question -->
    <h3><span id="markImg4"></span>What is the smallest US State?</h3>
    <div id="q4Choices" class="d-flex justify-content-center gap-3 flex-wrap"></div>
    <br>
    <div id="q4Feedback"></div>
    <br>

    
    <!-- Fifth Question -->
    <h3><span id="markImg5"></span> What is the largest U.S. state?</h3>
    <div id="q5Choices" class="d-flex justify-content-center flex-wrap"></div>
    <br>
    <div id="q5Feedback"></div>
    <br>

     <!-- Sixth Question -->
    <h3><span id="markImg6"></span>How many states are in the USA?</h3>
    <input type="number" id="q6" class="form-control w-25 mx-auto" min="1" max="100" placeholder="Enter a number">
    <br>
    <div id="q6Feedback"></div>
    <br>



    <!-- Validation feedback -->
    <h3 id="validationFdbk" class="bg-danger text-white"></h3>
    <br>

    <!-- Score and attempts -->
    <h2 id="totalScore" class="text-info"></h2>
    <h3 id="totalAttempts" class="text-secondary"></h3>
    <h4 id="congratsMsg" class="text-success"></h4>

    <button class="btn btn-outline-primary mt-3">Submit Quiz</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
